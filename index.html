<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send a Birthday Card!</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
   <script src="https://cdn.jsdelivr.net/npm/profanity-cleaner@latest"></script>

    <script src="script.js"></script>
<body>

    <div class="card">
        <h1>Send a Birthday Card!</h1>
        <p>Fill in the details to send a birthday message to someone via email!</p>

        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="sender_name" placeholder="Your name">
        </div>

        <div class="input-group">
            <label>Recipient's Name</label>
            <input type="text" id="friend_name" placeholder="Who is it for?">
        </div>

        <div class="input-group">
            <label>Recipient's Email</label>
            <input type="email" id="friend_email" placeholder="email@example.com">
        </div>

        <div class="input-group">
            <label>Personal Message</label>
            <textarea id="birthday_message" placeholder="Have a fantastic year..."></textarea>
        </div>

        <button onclick="sendSurprise()">Send Birthday Magic</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
